<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MimusicWeb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* PALETA CLARA Y LLAMATIVA */
        body { 
            background-color: #f8f9fa; /* Fondo claro */
            color: #212529; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navbar Verde Vibrante para que resalte */
        .navbar { 
            background-color: #1DB954 !important; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: bold;
        }

        /* Título Principal */
        h1.fw-bold {
            color: #1DB954;
            border-left: 5px solid #1DB954;
            padding-left: 15px;
            margin-top: 40px;
        }

        /* Tabla Estilizada en tonos claros */
        .table { 
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            color: #212529; 
        }

        /* Efecto al pasar el mouse por la fila */
        .table-hover tbody tr:hover { 
            background-color: #f1fef5 !important; /* Un verde muy sutil */
            color: #1DB954;
            font-weight: 500;
        }

        .thead-green {
            background-color: #e9ecef;
            color: #1DB954;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://tse1.mm.bing.net/th/id/OIP.pwArMmDWHwrh_89xIRDFrAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" 
                     alt="Logo" width="40" class="me-2 rounded-circle border border-white">
                MIMUSIC
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="Inicio.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="buscar.html">Buscar</a></li>
                    <li class="nav-item"><a class="nav-link active" href="playlist.html">Playlists</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="fw-bold">Mi Playlist Favorita</h1>
        
        <table class="table table-hover mt-4">
            <thead class="thead-green">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Título</th>
                    <th scope="col">Álbum</th>
                    <th scope="col">Duración</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td class="fw-bold">Let Her Go</td>
                    <td>All the Little Lights</td>
                    <td>4:12</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td class="fw-bold">Perfect</td>
                    <td>Divide</td>
                    <td>4:23</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
