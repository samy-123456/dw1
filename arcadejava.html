<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="arcade.css">
</head>

<body>
    <h1>Bienvenido al arcade</h1>
    <p>ingresa tu edad y tu codigo (si tienes uno:) </p>
    <input type="number" id="edadUsuario" placeholder="ingresa tu edad">
    <input type="text" id="codigoUsuario" placeholder="ingresa tu codigo">
    <button onclick="verificarEntrada()">Comprobar</button>
    <script src="arcade.js"></script>
    <h2 id="mensajeFinal">Esperando tu datos</h2>
    <h2 id="mensajePreferencial"></h2>
    
     <hr style="margin: 30px 0;">
     
     <div class="maquina-juego">
        <h2>Mini juego adivina el numero</h2>
        <p>seleccione una dificultad</p>
        <select id="dificultad" onchange="iniciarJuego()">
            <option value="0">--elige una opcion--</option>
            <option value="10">Facil(1-10)</option>
            <option value="50">Medio(1-50)</option>
            <option value="100">Dificil(1-100)</option>
        </select>
        <br><br>
        <div id="zonaAdivina">
            <p id="pistaJuego">Estoy pensando un numero..¿cual es?</p>
            <input type="number" id="numeroInterno" placeholder="ingresa tu numero">
            <button onclick="adivinaNumero()">Adivinar</button>
            <h3 id="intentosRestantesTexto"></h3>
        </div>
     </div>

</body>

</html>
